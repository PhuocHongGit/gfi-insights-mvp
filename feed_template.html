<!DOCTYPE html>
<html lang="vi"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Insights · GFI Smart Money Feed</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=JetBrains+Mono:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0a0b;--panel:#111113;--border:#262629;--border2:#303034;--ink:#FFF;--muted:#C7CBD2;
    --faint:#838A95;--accent:#EAD98A;--gold:#f6d365;--gold-hi:#F3E8A4;--gold-lo:#E4CE72;--ink-on-gold:#191712;
    --font:'Sora',system-ui,sans-serif;--mono:'JetBrains Mono',monospace}
  *{box-sizing:border-box} html,body{margin:0}
  body{background:radial-gradient(1200px 600px at 20% -10%,#16160f 0%,var(--bg) 55%) fixed,var(--bg);
    color:var(--ink);font-family:var(--font);-webkit-font-smoothing:antialiased;min-height:100vh}
  .wrap{max-width:1200px;margin:0 auto;padding:36px 24px 90px}
  h1.page{font-size:32px;font-weight:800;margin:0 0 6px}
  .sub{color:var(--muted);font-size:14.5px;margin:0 0 4px}
  .meta{color:var(--faint);font-size:12.5px;margin:0 0 24px;font-family:var(--mono)}
  /* tabs */
  .tabbar{display:flex;align-items:center;gap:8px;margin-bottom:26px}
  .navbtn{flex:none;width:34px;height:34px;border-radius:50%;border:1px solid var(--border2);
    background:var(--panel);color:var(--muted);cursor:pointer;display:grid;place-items:center;font-size:16px}
  .navbtn:hover{background:#161618;color:var(--ink)}
  .tabs{flex:1;display:flex;gap:24px;overflow-x:auto;scroll-behavior:smooth;padding:4px 2px;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{flex:none;display:flex;align-items:center;gap:8px;background:none;border:none;color:var(--muted);
    font-size:15px;font-weight:600;cursor:pointer;padding:6px 2px 10px;white-space:nowrap;
    border-bottom:2px solid transparent;font-family:inherit}
  .tab:hover{color:#d8d8dc}
  .tab .cnt{min-width:20px;height:20px;padding:0 6px;border-radius:10px;background:#242428;color:var(--muted);
    font-size:12px;font-weight:700;display:inline-grid;place-items:center}
  .tab.active{color:var(--gold);border-bottom-color:var(--gold)}
  .tab.active .cnt{background:rgba(246,211,101,.16);color:var(--gold)}
  /* feed */
  .feed{display:flex;flex-direction:column;gap:22px}
  .card{position:relative;display:flex;border-radius:18px;overflow:hidden;border:1px solid var(--border);
    background:radial-gradient(120% 140% at 100% -20%,color-mix(in srgb,var(--accent) 10%,transparent),transparent 55%),
    linear-gradient(180deg,#131315 0%,#0f0f11 100%);min-height:300px}
  .card.noimg{min-height:0}
  .left{position:relative;flex:0 0 46%;display:flex;align-items:center;padding:16px;background:#0b0b0d}
  .left img{width:100%;height:auto;display:block;border-radius:12px;border:1px solid var(--border)}
  .right{flex:1 1 auto;padding:24px 28px 20px;display:flex;flex-direction:column;min-width:0}
  .card.noimg .left{display:none}
  .headline{display:inline-block;align-self:flex-start;font-size:21px;line-height:1.16;font-weight:800;
    letter-spacing:-.005em;color:var(--ink-on-gold);text-transform:uppercase;padding:8px 13px;border-radius:9px;
    background:linear-gradient(96deg,var(--gold-hi) 0%,var(--gold-lo) 100%)}
  .tags{display:flex;gap:9px;margin:14px 0 2px;flex-wrap:wrap}
  .tag{font-family:var(--mono);font-size:13px;font-weight:800;letter-spacing:.03em;padding:5px 11px;border-radius:7px}
  .lead{font-size:15px;line-height:1.42;font-weight:600;color:#EEF1F6;margin-top:12px}
  .lead b{color:#fff}
  .blist{display:flex;flex-direction:column;gap:7px;margin:12px 0 2px}
  .brow{display:flex;gap:9px;font-size:14px;line-height:1.34;color:var(--muted)}
  .brow .dot{color:var(--accent);font-weight:800;flex:none}
  .brow b{color:#E7EAF0;font-weight:700}
  .tip{display:flex;gap:9px;align-items:flex-start;font-size:14px;line-height:1.4;font-weight:600;
    color:#F1ECD4;background:rgba(234,217,138,.10);border:1px solid rgba(234,217,138,.28);
    border-radius:10px;padding:10px 12px;margin-top:14px}
  .tip .em{flex:none;font-size:15px}
  .footer{margin-top:auto;padding-top:16px;display:flex;align-items:center;justify-content:space-between;gap:16px}
  .share{display:flex;align-items:center;gap:9px}
  .share .lbl{font:800 11px var(--mono);letter-spacing:.14em;color:var(--faint);text-transform:uppercase}
  .sbtn{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;background:#16161c;
    border:1px solid var(--border2);text-decoration:none}
  .sbtn svg{width:16px;height:16px;display:block}
  .brand{font:800 11px var(--mono);letter-spacing:.16em;color:rgba(255,255,255,.26)}
  /* full pre-rendered card (news / sentiment / narrative) — the image IS the whole card */
  .card.full{flex-direction:column;padding:0;background:#0b0b0d}
  .full-img{width:100%;height:auto;display:block}
  .full-foot{padding:11px 20px;display:flex;justify-content:flex-end;border-top:1px solid var(--border)}
  .empty{color:var(--muted);text-align:center;padding:60px 0;font-size:16px}
  /* card images are clickable → modal */
  .card .left,.card.full .full-img{cursor:zoom-in}
  .left .hint,.full .hint{position:absolute;top:12px;left:12px;font:700 10px var(--mono);letter-spacing:.08em;
    color:#cfcfd4;background:rgba(10,10,12,.7);border:1px solid var(--border2);border-radius:6px;padding:3px 7px;
    opacity:0;transition:.15s;pointer-events:none}
  .card:hover .hint{opacity:1}
  /* ---- modal / lightbox ---- */
  .overlay{position:fixed;inset:0;background:rgba(5,5,7,.82);backdrop-filter:blur(3px);display:none;
    align-items:center;justify-content:center;padding:24px;z-index:100}
  .overlay.open{display:flex}
  .modal{width:min(1200px,96vw);height:90vh;background:#131315;border:1px solid var(--border2);
    border-radius:18px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.6)}
  .m-head{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:15px 20px;border-bottom:1px solid var(--border)}
  .m-head .htitle{font:800 16px var(--font);color:#fff;display:flex;align-items:baseline;gap:9px;min-width:0;overflow:hidden}
  .m-head .htitle span:first-child{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .m-head .hdate{color:var(--faint);font-weight:600;font-size:13px;font-family:var(--mono);flex:none}
  .m-close{flex:none;width:36px;height:36px;border-radius:10px;background:#242428;border:1px solid var(--border2);
    color:#cfcfd4;font-size:19px;cursor:pointer}
  .m-close:hover{background:#303036;color:#fff}
  .m-body{flex:1;display:flex;gap:20px;padding:20px;min-height:0;overflow:hidden}
  .m-imgwrap{flex:0 0 52%;min-height:0;display:flex;align-items:center;justify-content:center;overflow:auto;
    background:#0b0b0d;border:1px solid var(--border2);border-radius:14px}
  .m-imgwrap img{max-width:100%;max-height:100%;object-fit:contain;display:block;cursor:zoom-in;transition:transform .12s}
  .m-imgwrap.zoom{align-items:flex-start;justify-content:flex-start}
  .m-imgwrap.zoom img{max-width:none;max-height:none;width:195%;cursor:zoom-out}
  .m-text{flex:1;min-height:0;overflow-y:auto;padding-right:6px}
  .m-text::-webkit-scrollbar{width:8px}.m-text::-webkit-scrollbar-thumb{background:#33333a;border-radius:6px}
  .m-text h2{font:800 20px var(--font);color:#fff;margin:0 0 12px;line-height:1.34}
  .m-text .tags{margin:0 0 16px}
  .box{background:#1b1b1e;border:1px solid var(--border);border-radius:12px;padding:13px 15px}
  .box+.box{margin-top:11px}
  .box-lbl{font:700 12px var(--font);color:var(--muted);margin:0 0 7px}
  .box-body{color:#e7e7ea;font-size:14px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
  .box-body a{color:#60a5fa;text-decoration:none}.box-body a:hover{text-decoration:underline}
  .m-foot{padding:13px 20px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
  @media(max-width:820px){.card{flex-direction:column}.left{flex:none;width:100%}
    .m-body{flex-direction:column;overflow-y:auto}.m-imgwrap{flex:none;width:100%}.m-text{overflow:visible}}
</style></head><body>
<div class="wrap">
  <h1 class="page">Insights</h1>
  <p class="sub">Baseline chất lượng cho mọi tier — context + risk, không phải khuyến nghị mua/bán</p>
  <p class="meta" id="meta"></p>
  <div class="tabbar">
    <button class="navbtn" id="navL">&#10094;</button>
    <div class="tabs" id="tabs"></div>
    <button class="navbtn" id="navR">&#10095;</button>
  </div>
  <div class="feed" id="feed"></div>
</div>
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="m-head">
      <div class="htitle"><span id="mTitle"></span><span class="hdate" id="mDate"></span></div>
      <button class="m-close" id="mClose">&times;</button>
    </div>
    <div class="m-body">
      <div class="m-imgwrap" id="mImgWrap"><img id="mImg" alt="card"></div>
      <div class="m-text" id="mText"></div>
    </div>
    <div class="m-foot"><div class="share" id="mShare"></div><div class="brand">GFI · INSIGHTS</div></div>
  </div>
</div>
<script id="viewdata" type="application/json">__VIEWDATA__</script>
<script>
const DATA=JSON.parse(document.getElementById('viewdata').textContent);
const SIGS=DATA.signals,TABS=DATA.tabs,COUNTS=DATA.counts;
let activeTab='Tất cả';
document.getElementById('meta').textContent=DATA.meta||'';
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function hl(s){return esc(s)
  .replace(/(\$[0-9][0-9.,]*[KMB]?)/g,'<b>$1</b>')
  .replace(/(\([+\-]?[0-9.]+%\))/g,'<b>$1</b>')
  .replace(/([+\-]\$[0-9][0-9.,]*[KMB]?)/g,'<b>$1</b>')
  .replace(/(\$[A-Z]{2,6})/g,'<b>$1</b>');}
const SIC={
  x:'<svg viewBox="0 0 24 24"><path fill="#fff" d="M14.258 10.152 23.176 0h-2.113l-7.747 8.813L7.133 0H0l9.352 13.328L0 23.973h2.113l8.176-9.309 6.531 9.309H24zm-2.895 3.293-.949-1.328L2.875 1.56h3.246l6.086 8.523.945 1.328 7.91 11.078h-3.246z"/></svg>',
  fb:'<svg viewBox="0 0 24 24"><path fill="#5B8DEF" d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>',
  tg:'<svg viewBox="0 0 24 24"><path fill="#3DA7E0" d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>'};
function share(url,title){
  const u=encodeURIComponent(url||'https://gfi.io'),t=encodeURIComponent(title||'GFI Insights');
  const L={x:`https://twitter.com/intent/tweet?text=${t}&url=${u}`,
           fb:`https://www.facebook.com/sharer/sharer.php?u=${u}`,
           tg:`https://t.me/share/url?url=${u}&text=${t}`};
  return `<span class="lbl">Chia sẻ</span>`+['x','fb','tg'].map(k=>`<a class="sbtn" target="_blank" rel="noopener" href="${L[k]}">${SIC[k]}</a>`).join('');
}
function renderTabs(){
  const el=document.getElementById('tabs');
  el.innerHTML=TABS.map(t=>`<button class="tab ${t===activeTab?'active':''}" data-tab="${esc(t)}">${esc(t)}<span class="cnt">${COUNTS[t]||0}</span></button>`).join('');
  el.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{activeTab=b.dataset.tab;renderTabs();renderFeed();});
}
document.getElementById('navL').onclick=()=>document.getElementById('tabs').scrollBy({left:-260});
document.getElementById('navR').onclick=()=>document.getElementById('tabs').scrollBy({left:260});
function cardHTML(s,gi){
  if(s.fullCard){   // a complete pre-rendered card image — show it whole, just add a share footer
    return `<div class="card full">
      <img class="full-img" loading="lazy" src="${s.cardImg}" alt="${esc(s.headline||'card')}" onclick="openModal(${gi})">
      <span class="hint">↔ phóng to · chi tiết</span>
      <div class="full-foot"><div class="share">${share(s.shareUrl,s.headline)}</div></div>
    </div>`;
  }
  const tags=(s.tags||[]).map(t=>`<span class="tag" style="background:${t.bg};color:${t.fg}">${esc(t.text)}</span>`).join('');
  const bl=(s.bullets||[]).map(b=>`<div class="brow"><span class="dot">▸</span><span>${hl(b)}</span></div>`).join('');
  const img=s.cardImg?`<div class="left" onclick="openModal(${gi})"><img loading="lazy" src="${s.cardImg}" alt="card"><span class="hint">↔ phóng to · chi tiết</span></div>`:'';
  return `<div class="card ${s.cardImg?'':'noimg'}">${img}
    <div class="right">
      <div class="headline">${esc(s.headline)}</div>
      <div class="tags">${tags}</div>
      ${s.lead?`<div class="lead">${hl(s.lead)}</div>`:''}
      ${bl?`<div class="blist">${bl}</div>`:''}
      ${s.tip?`<div class="tip"><span class="em">💡</span><span>${esc(s.tip)}</span></div>`:''}
      <div class="footer"><div class="share">${share(s.shareUrl,s.headline)}</div><div class="brand">${esc(s.brand||'GFI · INSIGHTS')}</div></div>
    </div></div>`;
}
function renderFeed(){
  const items=SIGS.filter(s=>activeTab==='Tất cả'?true:s.tab===activeTab);
  const el=document.getElementById('feed');
  el.innerHTML=items.length?items.map(s=>cardHTML(s,SIGS.indexOf(s))).join(''):'<div class="empty">Không có tín hiệu trong mục này.</div>';
}

/* ---- click-to-open modal: zoomable image + full post info ---- */
const overlay=document.getElementById('overlay');
const mImgWrap=document.getElementById('mImgWrap'),mImg=document.getElementById('mImg');
function linkify(t){return esc(t).replace(/(https?:\/\/[^\s\]]+)/g,u=>`<a href="${u}" target="_blank" rel="noopener">${u}</a>`);}
window.openModal=function(i){
  const s=SIGS[i]; if(!s)return;
  document.getElementById('mTitle').textContent=s.title||s.headline||'';
  document.getElementById('mDate').textContent=s.date?('· '+s.date):'';
  mImgWrap.classList.remove('zoom');
  if(s.cardImg){mImg.src=s.cardImg;mImgWrap.style.display='';}else{mImgWrap.style.display='none';}
  const tags=(s.tags||[]).map(t=>`<span class="tag" style="background:${t.bg};color:${t.fg}">${esc(t.text)}</span>`).join('');
  const secs=(s.sections||[]).map(sec=>`<div class="box"><div class="box-lbl">${esc(sec.label)}</div><div class="box-body">${/Nguồn/i.test(sec.label)?linkify(sec.body):esc(sec.body)}</div></div>`).join('')
    ||`<div class="box"><div class="box-body">${esc(s.lead||'')}</div></div>`;
  document.getElementById('mText').innerHTML=`<h2>${esc(s.title||s.headline)}</h2><div class="tags">${tags}</div>${secs}`;
  document.getElementById('mShare').innerHTML=share(s.shareUrl,s.headline);
  overlay.classList.add('open');document.body.style.overflow='hidden';
};
function closeModal(){overlay.classList.remove('open');document.body.style.overflow='';}
document.getElementById('mClose').onclick=closeModal;
overlay.onclick=e=>{if(e.target===overlay)closeModal();};
mImgWrap.onclick=()=>{if(mImgWrap.style.display!=='none')mImgWrap.classList.toggle('zoom');};
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&overlay.classList.contains('open'))closeModal();});

renderTabs();renderFeed();
</script></body></html>
